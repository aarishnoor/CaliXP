<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calisthenics App</title>
    <style>
        /* =========================================
           1. PREMIUM DESIGN TOKENS
           ========================================= */
        :root {
            /* Brand Colors */
            --color-primary: #005BFF;
            --color-primary-glow: rgba(0, 91, 255, 0.4);
            --color-accent: #FFD700;
            
            /* Backgrounds (True Dark Mode) */
            --color-bg-app: #050505;
            --color-bg-surface: #121212;
            --color-bg-card: #1A1A1A;
            --color-bg-page: #000000;
            
            /* Text */
            --color-text-main: #FFFFFF;
            --color-text-muted: #8E8E93;
            --color-text-inverse: #000000;
            
            /* Borders */
            --color-border: #2A2A2A;
            
            /* Layout */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-pill: 9999px;
        }

        /* =========================================
           2. GLOBAL RESET
           ========================================= */
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: var(--font-family); 
            background-color: var(--color-bg-page); 
            color: var(--color-text-main); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* =========================================
           3. APP CONTAINER
           ========================================= */
        #app-container { 
            width: 100%; 
            max-width: 400px; 
            height: 100vh; 
            max-height: 850px; 
            background-color: var(--color-bg-app); 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            box-shadow: 0 0 40px rgba(255,255,255,0.05); 
            overflow: hidden; 
        }

        /* --- Scrollbar Hiding --- */
        .scrollable-area { overflow-y: auto; padding: 24px; flex-grow: 1; padding-bottom: 90px; }
        .scrollable-area::-webkit-scrollbar { display: none; }
        .h-scroll::-webkit-scrollbar { display: none; }

        /* =========================================
           4. ONBOARDING UI (EXISTING LOGIC)
           ========================================= */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: var(--color-text-main); font-size: 24px; font-weight: bold; }
        .skip-btn { background: none; border: none; font-size: 16px; color: var(--color-text-muted); cursor: pointer; }
        
        h1 { font-size: 28px; font-weight: 800; text-align: center; margin-bottom: 8px; }
        p.subtitle { font-size: 16px; color: var(--color-text-muted); text-align: center; margin-bottom: 32px; }

        .progress-track { width: 50%; height: 4px; background-color: var(--color-border); border-radius: var(--radius-pill); overflow: hidden; }
        .progress-fill { height: 100%; background-color: var(--color-primary); width: 0%; transition: 0.3s ease-out; }

        .btn-primary { width: 100%; padding: 18px 24px; background-color: var(--color-primary); color: white; font-size: 16px; font-weight: 700; border: none; border-radius: var(--radius-pill); cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px var(--color-primary-glow); }
        .btn-primary:active:not(:disabled) { transform: scale(0.98); }
        .btn-primary:disabled { background-color: #333; color: #666; box-shadow: none; cursor: not-allowed; }

        .card-option { display: flex; align-items: center; justify-content: space-between; padding: 20px; background-color: var(--color-bg-surface); border: 2px solid var(--color-border); border-radius: var(--radius-md); cursor: pointer; margin-bottom: 16px; transition: 0.2s; }
        .card-option.is-selected { border-color: var(--color-primary); background-color: rgba(0, 91, 255, 0.1); }
        .card-title { font-size: 18px; font-weight: 700; }
        .card-sub { font-size: 14px; color: var(--color-text-muted); margin-top: 4px; }

        /* Metrics & Schedule Overrides */
        .metrics-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .toggle-group { display: flex; background-color: var(--color-bg-surface); border-radius: var(--radius-pill); padding: 4px; }
        .toggle-btn { padding: 6px 16px; border: none; background: transparent; border-radius: var(--radius-pill); color: var(--color-text-muted); font-weight: 600; cursor: pointer; }
        .toggle-btn.active { background-color: var(--color-primary); color: white; }
        .big-input { border: none; font-size: 48px; font-weight: 800; color: var(--color-primary); width: 100px; text-align: center; background: transparent; outline: none; }
        
        .days-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 32px; }
        .day-btn { padding: 16px 0; border: 2px solid var(--color-border); border-radius: var(--radius-md); font-size: 20px; font-weight: 700; background-color: var(--color-bg-surface); color: white; cursor: pointer; }
        .day-btn.active { border-color: var(--color-primary); background-color: var(--color-primary); }
        .custom-select { width: 100%; padding: 16px; border-radius: var(--radius-md); font-size: 16px; font-weight: 600; background-color: var(--color-bg-surface); border: 2px solid var(--color-border); color: white; outline: none; }

        /* =========================================
           5. PREMIUM DASHBOARD UI
           ========================================= */
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-top: 10px;}
        .dash-header h2 { font-size: 24px; font-weight: 800; letter-spacing: 0.5px; margin: 0;}
        .pro-badge { background: linear-gradient(45deg, #FFD700, #FFA500); color: black; font-size: 12px; font-weight: 800; padding: 6px 12px; border-radius: 8px; box-shadow: 0 4px 10px rgba(255, 215, 0, 0.3); }
        
        .section-title { font-size: 18px; font-weight: 700; margin: 24px 0 16px 0; letter-spacing: 0.3px;}
        
        /* Horizontal Scrolling Elements */
        .h-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 8px; scroll-snap-type: x mandatory;}
        .tab-pill { padding: 10px 20px; border-radius: var(--radius-pill); font-size: 15px; font-weight: 600; color: var(--color-text-muted); background-color: var(--color-bg-surface); white-space: nowrap; cursor: pointer; border: 1px solid var(--color-border); scroll-snap-align: start; transition: 0.2s;}
        .tab-pill.active { color: white; background-color: var(--color-primary); border-color: var(--color-primary); box-shadow: 0 4px 12px var(--color-primary-glow); }
        
        .tag-chip { padding: 10px 16px; border-radius: var(--radius-sm); background-color: var(--color-bg-card); color: white; font-size: 13px; font-weight: 600; white-space: nowrap; display: flex; align-items: center; gap: 6px; border: 1px solid var(--color-border);}
        
        /* Workout Cards */
        .workout-list { display: flex; flex-direction: column; gap: 16px; }
        .workout-card { display: flex; align-items: center; gap: 16px; background-color: var(--color-bg-card); padding: 12px; border-radius: var(--radius-md); border: 1px solid var(--color-border); cursor: pointer; transition: transform 0.2s; }
        .workout-card:active { transform: scale(0.98); }
        .workout-img { width: 80px; height: 80px; border-radius: 12px; background: linear-gradient(135deg, #222, #333); display: flex; justify-content: center; align-items: center; font-size: 36px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);}
        .workout-info { flex: 1; }
        .w-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
        .w-meta { font-size: 13px; color: var(--color-text-muted); margin-bottom: 8px; }
        .bolt-container { display: flex; gap: 2px; }
        .bolt { color: #444; font-size: 12px; }
        .bolt.blue { color: var(--color-primary); text-shadow: 0 0 5px var(--color-primary-glow); }
        
        /* Custom Banner */
        .custom-banner { background: linear-gradient(135deg, #005BFF, #00C6FF); border-radius: var(--radius-lg); padding: 24px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 8px 24px var(--color-primary-glow); margin-bottom: 20px;}
        .banner-text { font-size: 26px; font-weight: 800; line-height: 1.1; text-transform: uppercase;}
        .banner-icon { font-size: 32px; background: rgba(255,255,255,0.2); width: 64px; height: 64px; display: flex; justify-content: center; align-items: center; border-radius: 16px; backdrop-filter: blur(5px); }

        /* Bottom Nav - Floating Glassmorphism Style */
        .bottom-nav { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(18, 18, 18, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 16px 0 24px 0; border-top: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--color-text-muted); font-size: 11px; font-weight: 600; gap: 4px; cursor: pointer; transition: 0.2s;}
        .nav-item.active { color: var(--color-primary); }
        .nav-icon { font-size: 24px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="scrollable-area" id="main-content">
            
            <div class="header" id="onboard-header">
                <button class="icon-btn" onclick="prevStep()">←</button>
                <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
                <button class="skip-btn" onclick="nextStep()">Skip</button>
            </div>

            <h1 id="question-title">Loading...</h1>
            <p class="subtitle" id="question-subtitle"></p>

            <div id="options-container" style="display: flex; flex-direction: column;"></div>

        </div>

        <div style="padding: 24px; background: var(--color-bg-app);" id="onboard-footer">
            <button class="btn-primary" id="next-btn" onclick="nextStep()" disabled>NEXT</button>
        </div>
    </div>

    <script>
        // --- DATA STRUCTURE ---
        const flowSteps = [
            { id: 'gender', type: 'options', title: 'What\'s your gender?', subtitle: 'Let us know you better', options: [{ value: 'male', title: 'Male', icon: '👨' }, { value: 'female', title: 'Female', icon: '👩' }] },
            { id: 'goals', type: 'options', title: 'What are your main goals?', subtitle: 'Let us tailor your calisthenics journey', options: [{ value: 'skills', title: 'Learn Skills', sub: 'Handstands, Muscle-ups', icon: '🤸' }, { value: 'muscle', title: 'Build Muscle', sub: 'Hypertrophy & Strength', icon: '💪' }, { value: 'shred', title: 'Get Shredded', sub: 'Lose fat, reveal abs', icon: '🔥' }] },
            { id: 'focus', type: 'options', title: 'Please choose your focus area', subtitle: 'Target specific muscle groups', options: [{ value: 'full_body', title: 'Full Body', icon: '🧍' }, { value: 'upper', title: 'Upper Body', sub: 'Arms & Chest', icon: '🦍' }, { value: 'core', title: 'Core', sub: 'Abs & Levers', icon: '🍫' }, { value: 'legs', title: 'Legs', sub: 'Pistol squats & Jumps', icon: '🦵' }] },
            { id: 'pushups', type: 'options', title: 'How many push-ups can you do?', subtitle: 'To determine your baseline strength', options: [{ value: 'beginner', title: 'Beginner', sub: '0-5 push-ups', icon: '☝️' }, { value: 'intermediate', title: 'Intermediate', sub: '5-15 push-ups', icon: '✌️' }, { value: 'advanced', title: 'Advanced', sub: 'At least 15+', icon: '👍' }] },
            { id: 'metrics', type: 'metrics', title: 'Let us know you better', subtitle: 'Help us boost your workout results' },
            { id: 'schedule', type: 'schedule', title: 'Set your weekly goal', subtitle: 'Train at least 3 days weekly for better results.' }
        ];

        // --- STATE ---
        let currentStepIndex = 0;
        let userData = { metrics: { weight: '', weightUnit: 'kg', height: '', heightUnit: 'cm' }, schedule: { days: null, startDay: 'SUNDAY' } }; 

        // --- ELEMENTS ---
        const mainContent = document.getElementById('main-content');
        const titleEl = document.getElementById('question-title');
        const subtitleEl = document.getElementById('question-subtitle');
        const optionsContainer = document.getElementById('options-container');
        const nextBtn = document.getElementById('next-btn');
        const progressFill = document.getElementById('progress');

        // --- LOGIC ---
        function renderStep() {
            const step = flowSteps[currentStepIndex];
            titleEl.textContent = step.title;
            subtitleEl.textContent = step.subtitle || '';
            progressFill.style.width = `${((currentStepIndex + 1) / flowSteps.length) * 100}%`;
            optionsContainer.innerHTML = '';

            if (step.type === 'options') renderOptions(step);
            else if (step.type === 'metrics') renderMetrics();
            else if (step.type === 'schedule') renderSchedule();
        }

        function renderOptions(step) {
            step.options.forEach(option => {
                const isSelected = userData[step.id] === option.value;
                const card = document.createElement('div');
                card.className = `card-option ${isSelected ? 'is-selected' : ''}`;
                card.onclick = () => { userData[step.id] = option.value; renderStep(); };
                card.innerHTML = `<div><div class="card-title">${option.title}</div>${option.sub ? `<div class="card-sub">${option.sub}</div>` : ''}</div><div style="font-size: 36px;">${option.icon}</div>`;
                optionsContainer.appendChild(card);
            });
            nextBtn.disabled = !userData[step.id];
        }

        function renderMetrics() {
            const m = userData.metrics;
            optionsContainer.innerHTML = `
                <div class="metrics-row">
                    <h3 style="margin:0;">Weight</h3>
                    <div class="toggle-group">
                        <button class="toggle-btn ${m.weightUnit === 'kg' ? 'active' : ''}" onclick="updateMetric('weightUnit', 'kg')">kg</button>
                        <button class="toggle-btn ${m.weightUnit === 'lbs' ? 'active' : ''}" onclick="updateMetric('weightUnit', 'lbs')">lbs</button>
                    </div>
                </div>
                <div style="text-align: center; margin-bottom: 32px;">
                    <input type="number" class="big-input" placeholder="00.0" value="${m.weight}" oninput="updateMetric('weight', this.value)">
                    <span style="color: var(--color-text-muted); font-weight: 600; font-size: 20px;">${m.weightUnit}</span>
                </div>
                <div class="metrics-row">
                    <h3 style="margin:0;">Height</h3>
                    <div class="toggle-group">
                        <button class="toggle-btn ${m.heightUnit === 'cm' ? 'active' : ''}" onclick="updateMetric('heightUnit', 'cm')">cm</button>
                        <button class="toggle-btn ${m.heightUnit === 'ft' ? 'active' : ''}" onclick="updateMetric('heightUnit', 'ft')">ft</button>
                    </div>
                </div>
                <div style="text-align: center;">
                    <input type="number" class="big-input" placeholder="000" value="${m.height}" oninput="updateMetric('height', this.value)">
                    <span style="color: var(--color-text-muted); font-weight: 600; font-size: 20px;">${m.heightUnit}</span>
                </div>
            `;
            nextBtn.disabled = !(m.weight && m.height);
        }

        function updateMetric(key, value) {
            userData.metrics[key] = value;
            if (key.includes('Unit')) renderStep(); else nextBtn.disabled = !(userData.metrics.weight && userData.metrics.height); 
        }

        function renderSchedule() {
            const s = userData.schedule;
            let daysHtml = '<div class="days-grid">';
            for(let i=1; i<=7; i++) { daysHtml += `<button class="day-btn ${s.days === i ? 'active' : ''}" onclick="updateSchedule('days', ${i})">${i}</button>`; }
            daysHtml += '</div>';

            optionsContainer.innerHTML = `
                <div style="text-align: center; margin-bottom: 16px; font-weight: 600;">🎯 Weekly training days</div>
                ${daysHtml}
                <div style="text-align: center; margin-bottom: 12px; color: var(--color-text-muted); font-size: 14px; margin-top: 24px;">📅 First day of week</div>
                <select class="custom-select" onchange="updateSchedule('startDay', this.value)">
                    <option value="SUNDAY" ${s.startDay === 'SUNDAY' ? 'selected' : ''}>SUNDAY</option>
                    <option value="MONDAY" ${s.startDay === 'MONDAY' ? 'selected' : ''}>MONDAY</option>
                </select>
            `;
            nextBtn.disabled = !s.days;
        }

        function updateSchedule(key, value) { userData.schedule[key] = value; renderStep(); }

        function nextStep() {
            if (currentStepIndex < flowSteps.length - 1) { currentStepIndex++; renderStep(); } 
            else finishOnboarding();
        }

        function prevStep() { if (currentStepIndex > 0) { currentStepIndex--; renderStep(); } }

        function finishOnboarding() {
            optionsContainer.innerHTML = `<div style="text-align: center; padding-top: 60px;"><div style="font-size: 64px; margin-bottom: 24px;">🔥</div><h2 style="font-size: 28px; margin-bottom: 12px;">Plan Ready</h2><p style="color: var(--color-text-muted);">Your personalized calisthenics journey has been generated.</p></div>`;
            titleEl.style.display = 'none'; subtitleEl.style.display = 'none'; document.getElementById('onboard-header').style.display = 'none';
            nextBtn.textContent = 'ENTER DASHBOARD'; nextBtn.disabled = false; nextBtn.onclick = loadDashboard;
        }

        // --- DASHBOARD UI GENERATION ---
        function loadDashboard() {
            // Remove the onboarding footer
            document.getElementById('onboard-footer').remove();
            
            // Inject new dashboard content
            mainContent.innerHTML = `
                <div class="dash-header">
                    <h2>HOME WORKOUT</h2>
                    <div class="pro-badge">👑 PRO</div>
                </div>

                <div class="section-title">Body Focus</div>
                <div class="h-scroll">
                    <div class="tab-pill active">Abs</div>
                    <div class="tab-pill">Arm</div>
                    <div class="tab-pill">Chest</div>
                    <div class="tab-pill">Leg</div>
                    <div class="tab-pill">Shoulder</div>
                </div>

                <div class="workout-list" style="margin-top: 8px;">
                    <div class="workout-card">
                        <div class="workout-img">🧍</div>
                        <div class="workout-info">
                            <div class="w-title">Abs Beginner</div>
                            <div class="w-meta">15 mins • 16 Exercises</div>
                            <div class="bolt-container"><span class="bolt blue">⚡</span><span class="bolt">⚡</span><span class="bolt">⚡</span></div>
                        </div>
                    </div>
                    
                    <div class="workout-card">
                        <div class="workout-img">🦍</div>
                        <div class="workout-info">
                            <div class="w-title">Abs Intermediate</div>
                            <div class="w-meta">24 mins • 21 Exercises</div>
                            <div class="bolt-container"><span class="bolt blue">⚡</span><span class="bolt blue">⚡</span><span class="bolt">⚡</span></div>
                        </div>
                    </div>

                    <div class="workout-card">
                        <div class="workout-img">🔥</div>
                        <div class="workout-info">
                            <div class="w-title">Abs Advanced</div>
                            <div class="w-meta">27 mins • 21 Exercises</div>
                            <div class="bolt-container"><span class="bolt blue">⚡</span><span class="bolt blue">⚡</span><span class="bolt blue">⚡</span></div>
                        </div>
                    </div>
                </div>

                <div class="h-scroll" style="margin-top: 24px;">
                    <div class="tag-chip"><span style="color:var(--color-primary)">⏱</span> >15 mins</div>
                    <div class="tag-chip"><span style="color:var(--color-primary)">⏱</span> 7-15 mins</div>
                    <div class="tag-chip"><span style="color:var(--color-primary)">🏋️</span> Equipment</div>
                    <div class="tag-chip"><span style="color:var(--color-primary)">🔥</span> Burn Fat</div>
                </div>

                <div class="section-title">Custom Workout</div>
                <div class="custom-banner">
                    <div>
                        <div class="banner-text">CREATE</div>
                        <div class="banner-text">YOUR OWN</div>
                    </div>
                    <div class="banner-icon">✏️</div>
                </div>
            `;

            // Inject Bottom Navigation Menu
            const bottomNav = document.createElement('div');
            bottomNav.className = 'bottom-nav';
            bottomNav.innerHTML = `
                <div class="nav-item active"><div class="nav-icon">⏱</div><div>Training</div></div>
                <div class="nav-item"><div class="nav-icon">🧭</div><div>Discover</div></div>
                <div class="nav-item"><div class="nav-icon">📊</div><div>Report</div></div>
                <div class="nav-item"><div class="nav-icon">⚙️</div><div>Settings</div></div>
            `;
            document.getElementById('app-container').appendChild(bottomNav);
        }

        renderStep();
    </script>
</body>
</html>
